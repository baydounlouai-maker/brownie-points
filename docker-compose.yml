services:
  app:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      DB_HOST: db
      DB_NAME: brownie_points
      DB_USER: brownie
      DB_PASS: brownie
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: brownie_points
      MYSQL_USER: brownie
      MYSQL_PASSWORD: brownie
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ubrownie", "-pbrownie"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
